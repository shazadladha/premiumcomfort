    <style>
        :root {
            --charcoal: #1E1E1E;
            --charcoal-deep: #141414;
            --charcoal-soft: #2D2D2D;
            --charcoal-mist: #3A3A3A;
            --brass: #B8964E;
            --brass-deep: #9A7B3C;
            --brass-light: #D4B978;
            --ivory: #F5F0E8;
            --ivory-deep: #E8E0D4;
            --ivory-light: #FAF7F2;
            --warm-white: #FEFCF8;
            --taupe: #9C8E82;
            --taupe-deep: #7A6E64;
            --border: rgba(30, 30, 30, 0.08);
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-body: 'Jost', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
        body {
            font-family: var(--font-body);
            color: var(--charcoal);
            background: var(--warm-white);
            line-height: 1.6;
        }

        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(254, 252, 248, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .nav-logo {
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 500;
            color: var(--charcoal);
            text-decoration: none;
            letter-spacing: 0.02em;
        }

        .nav-links { display: flex; gap: 2rem; align-items: center; }
        .nav-links a {
            font-family: var(--font-body);
            font-size: 0.85rem;
            font-weight: 400;
            color: var(--taupe);
            text-decoration: none;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }
        .nav-links a:hover { color: var(--brass); }
        .nav-links a.active { color: var(--brass); font-weight: 500; }

        .hero {
            padding: 8rem 3rem 4rem;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero h1 {
            font-family: var(--font-display);
            font-size: 3.5rem;
            font-weight: 300;
            color: var(--charcoal);
            margin-bottom: 1rem;
            letter-spacing: -0.01em;
        }

        .hero p {
            font-size: 1.1rem;
            color: var(--taupe);
            font-weight: 300;
            max-width: 500px;
            margin: 0 auto;
        }

        .gallery-count {
            text-align: center;
            padding: 1rem 3rem 2rem;
            font-size: 0.8rem;
            color: var(--taupe);
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        .gallery {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem 4rem;
            columns: 3;
            column-gap: 1.5rem;
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 1.5rem;
            border-radius: 12px;
            overflow: hidden;
            background: var(--warm-white);
            box-shadow: 0 2px 20px rgba(45, 40, 48, 0.06);
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.4s ease;
        }

        .gallery-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 40px rgba(45, 40, 48, 0.12);
        }

        .gallery-item img {
            width: 100%;
            display: block;
        }

        .empty-state {
            text-align: center;
            padding: 6rem 2rem;
            color: var(--taupe);
        }

        .empty-state p {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-style: italic;
        }

        .footer {
            text-align: center;
            padding: 3rem;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--taupe);
        }

        .footer a { color: var(--brass); text-decoration: none; }

        @media (max-width: 1024px) { .gallery { columns: 2; } }
        @media (max-width: 640px) {
            .gallery { columns: 1; padding: 0 1rem 3rem; }
            .hero { padding: 7rem 1.5rem 3rem; }
            .hero h1 { font-size: 2.5rem; }
            .nav { padding: 1rem 1.5rem; }
        }
    </style>
</head>
