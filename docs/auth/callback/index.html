<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorizing... — Premium Comfort</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #FBF8F4; color: #2D2830; }
        .card { text-align: center; padding: 3rem; max-width: 500px; }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; }
        p { color: #666; line-height: 1.6; }
        .spinner { width: 40px; height: 40px; border: 3px solid #eee; border-top-color: #6AAFA4; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1.5rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error { color: #c33; }
        .manual { margin-top: 2rem; padding: 1rem; background: #f5f5f5; border-radius: 8px; font-size: 0.85rem; word-break: break-all; }
        code { background: #e8e8e8; padding: 0.2em 0.5em; border-radius: 4px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="card">
        <div class="spinner" id="spinner"></div>
        <h1 id="title">Redirecting to local server...</h1>
        <p id="message">Forwarding your TikTok authorization to the local automation tool.</p>
        <div class="manual" id="manual" style="display:none;"></div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const state = params.get('state');
        const error = params.get('error');

        if (error) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('title').textContent = 'Authorization Failed';
            document.getElementById('title').className = 'error';
            document.getElementById('message').textContent = 'Error: ' + error;
        } else if (code) {
            // Forward all query params to local server
            const localUrl = 'http://localhost:3000/auth/callback' + window.location.search;

            // Try redirecting to local server
            window.location.href = localUrl;

            // If redirect doesn't work after 3 seconds, show manual instructions
            setTimeout(function() {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('title').textContent = 'Local server not reachable';
                document.getElementById('message').innerHTML =
                    'Make sure <code>npm run auth</code> is running, then click the link below:';
                var manual = document.getElementById('manual');
                manual.style.display = 'block';
                manual.innerHTML = '<a href="' + localUrl + '">' + localUrl + '</a>';
            }, 3000);
        } else {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('title').textContent = 'Missing Authorization Code';
            document.getElementById('message').textContent = 'No authorization code received from TikTok.';
        }
    </script>
</body>
</html>
